<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Punto Diritti — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0f2542;
    --navy-mid: #1e3a5f;
    --navy-light: #2d5282;
    --orange: #f97316;
    --orange-light: #fb923c;
    --orange-dark: #ea580c;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --white: #ffffff;
    --error: #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(45,82,130,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(30,58,95,0.6) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Geometric decorations */
  body::after {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    border: 1px solid rgba(249,115,22,0.12);
    border-radius: 50%;
    pointer-events: none;
  }

  .geo-circle {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 50%;
    pointer-events: none;
  }

  .geo-circle::before {
    content: '';
    position: absolute;
    top: 80px;
    left: 80px;
    right: 80px;
    bottom: 80px;
    border: 1px solid rgba(249,115,22,0.06);
    border-radius: 50%;
  }

  .login-container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: fadeInUp 0.6s ease both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow:
      0 25px 50px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .brand-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand-logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(249,115,22,0.3);
  }

  .brand-logo svg {
    width: 28px;
    height: 28px;
    fill: white;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .brand-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .divider-line {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--orange), transparent);
    margin: 20px auto 0;
    border-radius: 1px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: all 0.2s;
    outline: none;
  }

  input::placeholder { color: rgba(255,255,255,0.25); }

  input:focus {
    border-color: var(--orange);
    background: rgba(249,115,22,0.05);
    box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 15px rgba(249,115,22,0.25);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(249,115,22,0.35);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-secondary {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }

  .btn-secondary:hover {
    border-color: rgba(255,255,255,0.3);
    color: white;
    background: rgba(255,255,255,0.05);
  }

  .error-msg {
    background: rgba(220,38,38,0.1);
    border: 1px solid rgba(220,38,38,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fca5a5;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .success-msg {
    background: rgba(5,150,105,0.1);
    border: 1px solid rgba(5,150,105,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: #6ee7b7;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .toggle-link {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }

  .toggle-link a {
    color: var(--orange-light);
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }

  .toggle-link a:hover { text-decoration: underline; }

  .form-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 6px;
  }

  .form-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 28px;
  }

  .loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .login-card { padding: 36px 28px; }
  }
</style>
</head>
<body>
<div class="geo-circle"></div>

<div class="login-container">
  <div class="login-card">
    <div class="brand-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="brand-name">Studio Punto Diritti</div>
      <div class="brand-sub">Dashboard Operativa</div>
      <div class="divider-line"></div>
    </div>

    <!-- FORM LOGIN -->
    <div id="loginForm">
      <div class="form-title">Accedi</div>
      <div class="form-subtitle">Inserisci le tue credenziali per continuare</div>

      <div class="error-msg" id="loginError"></div>
      <div class="success-msg" id="loginSuccess"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="nome@studio.it" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Accedi</button>
      <button class="btn-secondary" onclick="showForgot()">Password dimenticata?</button>

      <div class="toggle-link">
        Prima volta? <a onclick="showRegister()">Crea account</a>
      </div>
    </div>

    <!-- FORM REGISTRAZIONE -->
    <div id="registerForm" style="display:none">
      <div class="form-title">Crea account</div>
      <div class="form-subtitle">Registra un nuovo utente dello studio</div>

      <div class="error-msg" id="registerError"></div>

      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="regName" placeholder="Mario Rossi">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="nome@studio.it">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 8 caratteri">
      </div>

      <button class="btn-primary" id="registerBtn" onclick="handleRegister()">Crea account</button>

      <div class="toggle-link">
        Hai già un account? <a onclick="showLogin()">Accedi</a>
      </div>
    </div>

    <!-- FORM RESET PASSWORD -->
    <div id="forgotForm" style="display:none">
      <div class="form-title">Reset password</div>
      <div class="form-subtitle">Ti invieremo un link per reimpostare la password</div>

      <div class="error-msg" id="forgotError"></div>
      <div class="success-msg" id="forgotSuccess"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="forgotEmail" placeholder="nome@studio.it">
      </div>

      <button class="btn-primary" onclick="handleForgot()">Invia link reset</button>
      <button class="btn-secondary" onclick="showLogin()">← Torna al login</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // CONFIGURAZIONE SUPABASE
  // Sostituisci con i tuoi valori dal progetto Supabase
  // ============================================================
  const SUPABASE_URL = 'https://irwiirstptywhpgiuqrt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlyd2lpcnN0cHR5d2hwZ2l1cXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTg5MzIsImV4cCI6MjA5MDQ3NDkzMn0.HV9LRV1FGZJ3XgUXPpjE4KbEnda_TsKgvXAOKTp7Q34';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Controlla se già loggato
  async function checkSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard.html';
  }
  checkSession();

  // ============================================================
  // NAVIGAZIONE TRA FORM
  // ============================================================
  function showLogin() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('forgotForm').style.display = 'none';
  }

  function showRegister() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('forgotForm').style.display = 'none';
  }

  function showForgot() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('forgotForm').style.display = 'block';
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
  }

  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.innerHTML = '<span class="loading-spinner"></span>Caricamento...';
      btn.disabled = true;
    } else {
      btn.disabled = false;
    }
  }

  // ============================================================
  // LOGIN
  // ============================================================
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) { showError('loginError', 'Inserisci email e password.'); return; }

    setLoading('loginBtn', true);
    document.getElementById('loginBtn').innerHTML = '<span class="loading-spinner"></span>Accesso in corso...';

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showError('loginError', 'Credenziali non valide. Riprova.');
      document.getElementById('loginBtn').innerHTML = 'Accedi';
      document.getElementById('loginBtn').disabled = false;
    } else {
      document.getElementById('loginBtn').innerHTML = '✓ Accesso effettuato';
      setTimeout(() => window.location.href = 'dashboard.html', 500);
    }
  }

  // Enter per submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginVisible = document.getElementById('loginForm').style.display !== 'none';
      if (loginVisible) handleLogin();
    }
  });

  // ============================================================
  // REGISTRAZIONE
  // ============================================================
  async function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!name || !email || !password) { showError('registerError', 'Compila tutti i campi.'); return; }
    if (password.length < 8) { showError('registerError', 'La password deve essere di almeno 8 caratteri.'); return; }

    document.getElementById('registerBtn').innerHTML = '<span class="loading-spinner"></span>Creazione...';
    document.getElementById('registerBtn').disabled = true;

    const { error } = await sb.auth.signUp({
      email,
      password,
      options: { data: { full_name: name, display_name: name.split(' ')[0] } }
    });

    if (error) {
      showError('registerError', error.message);
      document.getElementById('registerBtn').innerHTML = 'Crea account';
      document.getElementById('registerBtn').disabled = false;
    } else {
      document.getElementById('registerBtn').innerHTML = '✓ Account creato!';
      showSuccess('registerError', '');
      document.getElementById('registerError').style.display = 'none';
      // Mostra messaggio e torna al login
      alert('Account creato! Controlla la tua email per confermare la registrazione.');
      showLogin();
      document.getElementById('registerBtn').innerHTML = 'Crea account';
      document.getElementById('registerBtn').disabled = false;
    }
  }

  // ============================================================
  // RESET PASSWORD
  // ============================================================
  async function handleForgot() {
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showError('forgotError', 'Inserisci la tua email.'); return; }

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/dashboard.html'
    });

    if (error) {
      showError('forgotError', 'Errore nell\'invio. Riprova.');
    } else {
      showSuccess('forgotSuccess', 'Email inviata! Controlla la tua casella di posta.');
    }
  }
</script>
</body>
</html>
